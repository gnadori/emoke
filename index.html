<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagymama Koordinációs App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

    <!-- Képernyő: Bejelentkezés -->
    <div id="login-screen" class="screen active">
        <div class="card">
            <h1>Szia!</h1>
            <p>Lépj be, hogy lásd, mikor ki megy a nagymamához!</p>
            <button id="btn-login" class="btn btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Bejelentkezés Google fiókkal
            </button>
        </div>
    </div>

    <!-- Képernyő: Profil beállítás -->
    <div id="profile-setup-screen" class="screen">
        <div class="card">
            <h2>Profil beállítása</h2>
            <p>Válassz egy becenevet és egy színt, amivel megjelensz majd a naptárban!</p>
            <div class="form-group">
                <label for="nickname">Becenév:</label>
                <input type="text" id="nickname" placeholder="pl. Peti" required>
            </div>
            <div class="form-group">
                <label>Válassz színt:</label>
                <div class="color-picker" id="color-picker">
                    <div class="color-option" data-color="#EF4444" style="background: #EF4444;"></div>
                    <div class="color-option" data-color="#F97316" style="background: #F97316;"></div>
                    <div class="color-option" data-color="#F59E0B" style="background: #F59E0B;"></div>
                    <div class="color-option" data-color="#10B981" style="background: #10B981;"></div>
                    <div class="color-option" data-color="#3B82F6" style="background: #3B82F6;"></div>
                    <div class="color-option" data-color="#8B5CF6" style="background: #8B5CF6;"></div>
                    <div class="color-option" data-color="#EC4899" style="background: #EC4899;"></div>
                </div>
            </div>
            <button id="btn-save-profile" class="btn btn-primary">Mentés és Tovább</button>
        </div>
    </div>

    <!-- Képernyő: Fő alkalmazás -->
    <div id="app-screen" class="screen">
        <header class="app-header">
            <div class="header-content">
                <h2>Nagymama App</h2>
                <div class="user-info">
                    <span id="current-user-name"></span>
                    <button id="btn-logout" class="btn btn-small">Kijelentkezés</button>
                </div>
            </div>
        </header>

        <main class="app-content">
            <!-- Naptár rész -->
            <section class="calendar-section card">
                <div class="calendar-header">
                    <button id="prev-month" class="btn-icon">&lt;</button>
                    <h3 id="current-month-year">Július 2026</h3>
                    <button id="next-month" class="btn-icon">&gt;</button>
                </div>
                <div class="calendar-weekdays">
                    <div>H</div><div>K</div><div>Sze</div><div>Cs</div><div>P</div><div>Szo</div><div>V</div>
                </div>
                <div id="calendar-grid" class="calendar-grid">
                    <!-- Napok ide generálódnak JS-ből -->
                </div>
                <div id="user-legend" class="user-legend">
                    <!-- Felhasználók listája ide generálódik -->
                </div>
            </section>

            <!-- Fórum rész -->
            <section class="forum-section card">
                <h3>Üzenőfal</h3>
                <div class="forum-controls">
                    <div class="filters" id="tag-filters">
                        <button class="tag-filter active" data-tag="all">Összes</button>
                        <button class="tag-filter tag-medicine" data-tag="gyógyszer">Gyógyszer</button>
                        <button class="tag-filter tag-food" data-tag="kaja">Kaja</button>
                        <button class="tag-filter tag-doctor" data-tag="orvos">Orvos</button>
                        <button class="tag-filter tag-other" data-tag="egyéb">Egyéb</button>
                    </div>
                </div>
                
                <form id="new-post-form" class="new-post-form">
                    <textarea id="post-content" placeholder="Írj valami újat..." required></textarea>
                    <div class="post-actions">
                        <select id="post-tag" required>
                            <option value="egyéb">Egyéb</option>
                            <option value="gyógyszer">Gyógyszer</option>
                            <option value="kaja">Kaja</option>
                            <option value="orvos">Orvos</option>
                        </select>
                        <button type="submit" class="btn btn-primary">Küldés</button>
                    </div>
                </form>

                <div id="forum-posts" class="forum-posts">
                    <!-- Bejegyzések ide generálódnak -->
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="firebase-config.js?v=2"></script>
    <script type="module" src="auth.js?v=2"></script>
    <script type="module" src="calendar.js?v=2"></script>
    <script type="module" src="forum.js?v=2"></script>
</body>
</html>
